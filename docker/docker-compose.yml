services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: power-trade-rag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: power_trade_rag
      MYSQL_USER: rag_user
      MYSQL_PASSWORD: rag123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init_db.sql:/docker-entrypoint-initdb.d/init.sql
      - ../sql/sample_data.sql:/docker-entrypoint-initdb.d/sample.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - power-trade-rag-network

  # Redis缓存
  redis:
    image: redis:7.0-alpine
    container_name: power-trade-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - power-trade-rag-network

  # ChromaDB向量数据库
  chromadb:
    image: chromadb/chroma:latest
    container_name: power-trade-rag-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - power-trade-rag-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: power-trade-rag-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - power-trade-rag-network

  etcd:
    container_name: power-trade-rag-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - power-trade-rag-network

  milvus:
    container_name: power-trade-rag-milvus
    image: milvusdb/milvus:v2.4.6
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - power-trade-rag-network

  # 后端服务
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: power-trade-rag-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=power_trade_rag
      - MYSQL_USER=rag_user
      - MYSQL_PASSWORD=rag123456
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MINIO_ENABLED=true
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET_NAME=power-trade-rag
    depends_on:
      - mysql
      - redis
      - chromadb
      - minio
      - etcd
      - milvus
    networks:
      - power-trade-rag-network

  # 前端服务（可选，如果需要独立的nginx代理）
  frontend:
    image: node:16-alpine
    container_name: power-trade-rag-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../power-trade-rag-web:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - power-trade-rag-network

volumes:
  mysql_data:
  redis_data:
  chromadb_data:
  minio_data:
  etcd_data:
  milvus_data:

networks:
  power-trade-rag-network:
    driver: bridge
